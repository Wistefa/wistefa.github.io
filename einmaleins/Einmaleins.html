<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einmaleins – Mathe lernen macht Spaß!</title>
  <style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --add: #4CAF50;
  --sub: #f44336;
  --mul: #2196F3;
  --div: #FF9800;
  --mix: #9C27B0;
  --bg: #FFF9F0;
  --card: #ffffff;
  --text: #333;
  --radius: 18px;
  --shadow: 0 6px 20px rgba(0,0,0,0.12);
}

html, body {
  height: 100%;
  font-family: 'Segoe UI', 'Comic Sans MS', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 16px;
}

/* ===================== SCREENS ===================== */
.screen {
  display: none;
  width: 100%;
  max-width: 480px;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  animation: fadeIn 0.35s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================== START SCREEN ===================== */
.logo {
  font-size: 80px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  animation: bounce 1.8s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

h1 {
  font-size: 2.8rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
}

.subtitle {
  font-size: 1.1rem;
  color: #888;
  text-align: center;
}

/* Level buttons */
.level-select { width: 100%; text-align: center; }
.level-select p { font-size: 1rem; color: #666; margin-bottom: 10px; }

.level-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.level-btn {
  padding: 10px 16px;
  border: 3px solid #ddd;
  border-radius: 14px;
  background: white;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
}
.level-btn:hover { border-color: #aaa; transform: scale(1.05); }
.level-btn.active { border-color: #FFD700; background: #FFFACD; font-weight: bold; }

/* Operation grid */
.operation-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
}

.op-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 12px;
  border: none;
  border-radius: var(--radius);
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
}
.op-btn:hover  { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.18); }
.op-btn:active { transform: translateY(0); }

.op-btn[data-op="add"] { background: linear-gradient(135deg, #56ab2f, #a8e063); }
.op-btn[data-op="sub"] { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
.op-btn[data-op="mul"] { background: linear-gradient(135deg, #1565C0, #42A5F5); }
.op-btn[data-op="div"] { background: linear-gradient(135deg, #f7971e, #ffd200); color: #333; }
.op-btn[data-op="mix"] { background: linear-gradient(135deg, #7B1FA2, #CE93D8); }

.op-mix { grid-column: 1 / -1; }

.op-icon { font-size: 2rem; }

/* ===================== GAME SCREEN ===================== */
.game-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.btn-icon {
  font-size: 1.5rem;
  background: white;
  border: 2px solid #eee;
  border-radius: 12px;
  padding: 8px 12px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: transform 0.15s;
}
.btn-icon:hover { transform: scale(1.1); }

.score-box {
  display: flex;
  gap: 14px;
  font-size: 1.3rem;
  font-weight: bold;
}

#progress-bar-wrap {
  width: 100%;
  height: 10px;
  background: #eee;
  border-radius: 8px;
  overflow: hidden;
  margin-top: 4px;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #56ab2f, #a8e063);
  border-radius: 8px;
  transition: width 0.5s ease;
  width: 0%;
}

.question-area {
  width: 100%;
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow);
}

#question-number {
  font-size: 0.9rem;
  color: #aaa;
  margin-bottom: 12px;
}

#task-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  font-size: 3.5rem;
  font-weight: 900;
}

.equals { color: #aaa; }

#answer-display {
  color: #ccc;
  min-width: 60px;
}

.input-area {
  width: 100%;
  display: flex;
  gap: 12px;
}

#answer-input {
  flex: 1;
  font-size: 2rem;
  font-weight: bold;
  text-align: center;
  padding: 14px;
  border: 3px solid #eee;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.2s;
  background: white;
}
#answer-input:focus { border-color: #42A5F5; }

.btn-primary {
  padding: 14px 22px;
  font-size: 1.1rem;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #56ab2f, #a8e063);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(86,171,47,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(86,171,47,0.45); }
.btn-primary:active { transform: translateY(0); }

/* Feedback */
.feedback {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  font-size: 1.3rem;
  font-weight: bold;
  text-align: center;
  animation: popIn 0.3s ease;
}
.feedback.correct { background: #E8F5E9; color: #2E7D32; }
.feedback.wrong   { background: #FFEBEE; color: #C62828; }
.feedback.hidden  { display: none; }

@keyframes popIn {
  0%   { transform: scale(0.8); opacity: 0; }
  60%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

/* Numpad */
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
}

.np-btn {
  font-size: 1.6rem;
  font-weight: bold;
  padding: 18px;
  border: 2px solid #eee;
  border-radius: 14px;
  background: white;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: background 0.1s, transform 0.1s;
  user-select: none;
}
.np-btn:hover  { background: #f0f0f0; transform: scale(1.05); }
.np-btn:active { background: #e0e0e0; transform: scale(0.97); }
.np-zero       { grid-column: 1 / 2; }
.np-del        { grid-column: 3 / 4; background: #FFF3E0; color: #E65100; }

/* ===================== RESULT SCREEN ===================== */
.result-big-emoji {
  font-size: 100px;
  animation: celebrate 0.6s ease;
}
@keyframes celebrate {
  0%   { transform: scale(0) rotate(-20deg); }
  60%  { transform: scale(1.2) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); }
}

h2 { font-size: 2rem; font-weight: 900; text-align: center; }

#result-msg { color: #666; font-size: 1.1rem; text-align: center; }

.result-stats {
  display: flex;
  gap: 16px;
  width: 100%;
}

.stat-box {
  flex: 1;
  background: white;
  border-radius: var(--radius);
  padding: 18px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num   { font-size: 2.4rem; font-weight: 900; }
.stat-label { font-size: 0.85rem; color: #888; margin-top: 4px; }

.result-buttons {
  display: flex;
  gap: 14px;
  width: 100%;
}

.btn-secondary {
  flex: 1;
  padding: 14px;
  font-size: 1.05rem;
  font-weight: bold;
  color: #555;
  background: white;
  border: 2px solid #ddd;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
}
.btn-secondary:hover { background: #f5f5f5; transform: translateY(-2px); }

#btn-retry { flex: 1; }

/* ===================== SCREEN TINTING BY OP ===================== */
body[data-op="add"] { background: linear-gradient(160deg, #F1F8E9 0%, #FFF9F0 100%); }
body[data-op="sub"] { background: linear-gradient(160deg, #FBE9E7 0%, #FFF9F0 100%); }
body[data-op="mul"] { background: linear-gradient(160deg, #E3F2FD 0%, #FFF9F0 100%); }
body[data-op="div"] { background: linear-gradient(160deg, #FFF8E1 0%, #FFF9F0 100%); }
body[data-op="mix"] { background: linear-gradient(160deg, #F3E5F5 0%, #FFF9F0 100%); }

/* ===================== RESPONSIVE ===================== */
@media (max-width: 380px) {
  #task-display { font-size: 2.8rem; }
  h1 { font-size: 2.2rem; }
}

/* ===================== ERKLÄRBILDSCHIRM ===================== */

.exp-topbar {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
}
.exp-character {
  font-size: 64px;
  line-height: 1;
  flex-shrink: 0;
  animation: charFloat 2.5s ease-in-out infinite;
}
@keyframes charFloat {
  0%, 100% { transform: translateY(0) rotate(-4deg); }
  50%       { transform: translateY(-10px) rotate(4deg); }
}
.exp-title-block { flex: 1; }
.exp-op-title {
  font-size: 1.3rem;
  font-weight: 900;
  color: #333;
}
.exp-example-counter {
  font-size: 0.9rem;
  color: #aaa;
  margin-top: 2px;
}
.btn-skip {
  background: none;
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 7px 12px;
  font-size: 1rem;
  color: #bbb;
  cursor: pointer;
  flex-shrink: 0;
  transition: color 0.2s, border-color 0.2s;
}
.btn-skip:hover { color: #666; border-color: #999; }

.exp-formula-big {
  width: 100%;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  animation: formulaSlide 0.4s ease;
}
@keyframes formulaSlide {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.fml-num { font-size: 3rem; font-weight: 900; color: #333; }
.fml-op  { font-size: 3rem; font-weight: 900; color: #FF9800; }
.fml-eq  { font-size: 3rem; font-weight: 900; color: #bbb; }
.fml-res { font-size: 3rem; font-weight: 900; color: #56ab2f; }

.exp-stage {
  width: 100%;
  min-height: 120px;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px;
  overflow: hidden;
}

.stage-item {
  font-size: 2rem;
  display: inline-block;
  animation: itemPop 0.3s ease both;
}
@keyframes itemPop {
  0%   { transform: scale(0) rotate(-25deg); opacity: 0; }
  65%  { transform: scale(1.15) rotate(4deg); }
  100% { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.stage-item.gone {
  animation: itemGone 0.35s ease forwards;
}
@keyframes itemGone {
  to { transform: scale(0) rotate(20deg); opacity: 0; }
}
.stage-item.arrive {
  animation: itemArrive 0.4s ease both;
}
@keyframes itemArrive {
  0%   { transform: translateX(60px) scale(0.5); opacity: 0; }
  100% { transform: translateX(0)    scale(1);   opacity: 1; }
}

.stage-plus-sign {
  font-size: 2.2rem;
  font-weight: 900;
  color: #ddd;
}
.stage-group {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  border: 3px dashed #e8e8e8;
  border-radius: 14px;
}
.stage-group-label {
  width: 100%;
  text-align: center;
  font-size: 0.8rem;
  color: #bbb;
}
.stage-note {
  width: 100%;
  text-align: center;
  font-size: 0.85rem;
  color: #f44336;
  margin-top: 4px;
}

.exp-bottom {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.btn-speak {
  font-size: 1.8rem;
  background: white;
  border: 3px solid #eee;
  border-radius: 50%;
  width: 54px;
  height: 54px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-speak:hover  { transform: scale(1.12); box-shadow: 0 5px 16px rgba(0,0,0,0.15); }
.btn-speak.speaking { animation: speakPulse 0.7s ease-in-out infinite alternate; border-color: #4CAF50; }
@keyframes speakPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.18); }
}

.exp-dots { display: flex; gap: 9px; }
.exp-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #e0e0e0;
  transition: background 0.3s, transform 0.3s;
}
.exp-dot.active { background: #FF9800; transform: scale(1.35); }

.exp-nav-btns {
  width: 100%;
  display: flex;
  gap: 12px;
}

.btn-nav {
  flex: 1;
  padding: 13px;
  font-size: 1rem;
  font-weight: bold;
  background: white;
  border: 2px solid #eee;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
}
.btn-nav:hover     { background: #f5f5f5; transform: translateY(-2px); }
.btn-nav:disabled  { opacity: 0.3; pointer-events: none; }
.btn-nav-next      { border-color: #FF9800; color: #E65100; }
.btn-nav-next:hover { background: #FFF3E0; }

.hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- STARTBILDSCHIRM -->
  <div id="screen-start" class="screen active">
    <div class="logo">🧮</div>
    <h1>Einmaleins</h1>
    <p class="subtitle">Mathe lernen macht Spaß!</p>

    <div class="level-select">
      <p>Wähle deinen Level:</p>
      <div class="level-buttons">
        <button class="level-btn active" data-level="1">⭐ Einfach<br><small>Zahlen 1–10</small></button>
        <button class="level-btn" data-level="2">⭐⭐ Mittel<br><small>Zahlen 1–20</small></button>
        <button class="level-btn" data-level="3">⭐⭐⭐ Profi<br><small>Zahlen 1–100</small></button>
      </div>
    </div>

    <p>Wähle eine Rechenart:</p>
    <div class="operation-grid">
      <button class="op-btn" data-op="add">
        <span class="op-icon">➕</span>
        <span>Addieren</span>
      </button>
      <button class="op-btn" data-op="sub">
        <span class="op-icon">➖</span>
        <span>Subtrahieren</span>
      </button>
      <button class="op-btn" data-op="mul">
        <span class="op-icon">✖️</span>
        <span>Multiplizieren</span>
      </button>
      <button class="op-btn" data-op="div">
        <span class="op-icon">➗</span>
        <span>Dividieren</span>
      </button>
      <button class="op-btn op-mix" data-op="mix">
        <span class="op-icon">🎲</span>
        <span>Gemischt</span>
      </button>
    </div>
  </div>

  <!-- ERKLÄRBILDSCHIRM -->
  <div id="screen-explain" class="screen">

    <div class="exp-topbar">
      <div id="exp-char" class="exp-character"></div>
      <div class="exp-title-block">
        <div id="exp-op-title" class="exp-op-title"></div>
        <div id="exp-example-counter" class="exp-example-counter"></div>
      </div>
      <button id="btn-skip" class="btn-skip">⏭</button>
    </div>

    <div id="exp-formula-big" class="exp-formula-big"></div>

    <div id="exp-stage" class="exp-stage"></div>

    <div class="exp-bottom">
      <button id="btn-speak" class="btn-speak" title="Nochmal vorlesen">🔊</button>
      <div class="exp-dots" id="exp-dots"></div>
    </div>

    <div class="exp-nav-btns">
      <button id="btn-prev-step" class="btn-nav">◀</button>
      <button id="btn-next-step" class="btn-nav btn-nav-next">Weiter ▶</button>
      <button id="btn-lets-go" class="btn-primary hidden">Los geht's! 🚀</button>
    </div>

  </div>

  <!-- SPIELBILDSCHIRM -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <button id="btn-back" class="btn-icon">🏠</button>
      <div class="score-box">
        <span>⭐ <span id="score">0</span></span>
        <span>❌ <span id="errors">0</span></span>
      </div>
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div class="question-area">
      <div id="question-number">Frage <span id="q-current">1</span> / <span id="q-total">10</span></div>
      <div id="task-display">
        <span id="num1"></span>
        <span id="op-symbol"></span>
        <span id="num2"></span>
        <span class="equals">=</span>
        <span id="answer-display">?</span>
      </div>
    </div>

    <div class="input-area">
      <input type="number" id="answer-input" placeholder="?" inputmode="numeric" autocomplete="off">
      <button id="btn-check" class="btn-primary">Prüfen ✓</button>
    </div>

    <div id="feedback" class="feedback hidden"></div>

    <div class="numpad">
      <button class="np-btn" data-val="7">7</button>
      <button class="np-btn" data-val="8">8</button>
      <button class="np-btn" data-val="9">9</button>
      <button class="np-btn" data-val="4">4</button>
      <button class="np-btn" data-val="5">5</button>
      <button class="np-btn" data-val="6">6</button>
      <button class="np-btn" data-val="1">1</button>
      <button class="np-btn" data-val="2">2</button>
      <button class="np-btn" data-val="3">3</button>
      <button class="np-btn np-zero" data-val="0">0</button>
      <button class="np-btn np-del" data-val="del">⌫</button>
    </div>
  </div>

  <!-- ERGEBNISBILDSCHIRM -->
  <div id="screen-result" class="screen">
    <div id="result-emoji" class="result-big-emoji"></div>
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-num" id="res-correct"></div>
        <div class="stat-label">Richtig ✅</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="res-errors"></div>
        <div class="stat-label">Falsch ❌</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="res-stars"></div>
        <div class="stat-label">Punkte ⭐</div>
      </div>
    </div>
    <div class="result-buttons">
      <button id="btn-retry" class="btn-primary">Nochmal 🔁</button>
      <button id="btn-home" class="btn-secondary">Startseite 🏠</button>
    </div>
  </div>

  <script>
'use strict';

// ===================== ERKLÄR-DATEN =====================
const EXPLAIN_DATA = {
  add: {
    char: '🐸', title: 'Addieren  ➕', opColor: '#56ab2f',
    intro: 'Hallo! Ich bin Fridolin Frosch! Beim Addieren zählst du alles zusammen!',
    examples: [
      mkAdd(2, 1, '🍎', 'Fridolin hat 2 Äpfel. Er findet noch 1 mehr. 2 plus 1 ist gleich 3.'),
      mkAdd(3, 2, '🌸', 'Am Teich sieht Fridolin 3 Seerosen. Es kommen 2 dazu. 3 plus 2 ist gleich 5.'),
      mkAdd(4, 3, '⭐', 'Fridolin sammelt 4 Sterne. Dann findet er 3 weitere. 4 plus 3 ist gleich 7.'),
      mkAdd(5, 2, '🐟', '5 Fische schwimmen im Teich. 2 weitere kommen dazu. 5 plus 2 ist gleich 7.'),
      mkAdd(6, 3, '🍄', 'Im Wald stehen 6 Pilze. Dann wachsen 3 neue. 6 plus 3 ist gleich 9.'),
    ],
  },
  sub: {
    char: '🐰', title: 'Subtrahieren  ➖', opColor: '#f44336',
    intro: 'Halli-Hallo! Ich bin Hoppel Hase! Beim Subtrahieren nimmst du Dinge weg!',
    examples: [
      mkSub(5, 2, '🥕', 'Hoppel hat 5 Möhren. Er verschenkt 2 davon. 5 minus 2 ist gleich 3.'),
      mkSub(6, 3, '🍓', '6 Erdbeeren liegen im Korb. Hoppel isst 3 auf. 6 minus 3 ist gleich 3.'),
      mkSub(7, 4, '🌷', '7 Blumen blühen. Der Wind bricht 4 ab. 7 minus 4 ist gleich 3.'),
      mkSub(8, 5, '🫐', '8 Beeren sind im Topf. Hoppel nimmt 5 raus. 8 minus 5 ist gleich 3.'),
      mkSub(9, 3, '🍏', '9 grüne Äpfel hängen am Baum. 3 fallen runter. 9 minus 3 ist gleich 6.'),

function mkAdd(a, b, em, voice) {
  return { a, b, result: a + b, op: '+', voice, stage: stageAdd(em, a, b) };
}
function mkSub(a, b, em, voice) {
  return { a, b, result: a - b, op: '−', voice, stage: stageSub(em, a, b) };
}
function mkMul(a, b, em, voice) {
  return { a, b, result: a * b, op: '×', voice, stage: stageMul(em, a, b) };
}
function mkDiv(a, b, em, voice) {
  return { a, b, result: a / b, op: '÷', voice, stage: stageDiv(em, a, b) };
}

function stageAdd(em, a, b) {
  let h = '';
  for (let i = 0; i < a; i++)
    h += `<span class="stage-item" style="animation-delay:${i*70}ms">${em}</span>`;
  h += `<span class="stage-plus-sign">+</span>`;
  for (let i = 0; i < b; i++)
    h += `<span class="stage-item arrive" style="animation-delay:${(a+i)*70}ms">${em}</span>`;
  return h;
}
function stageSub(em, a, b) {
  let h = '';
  const keep = a - b;
  for (let i = 0; i < a; i++) {
    const cls = i >= keep ? ' gone' : '';
    h += `<span class="stage-item${cls}" style="animation-delay:${i*70}ms">${em}</span>`;
  }
  h += `<div class="stage-note">❌ ${b} werden weggegeben</div>`;
  return h;
}
function stageMul(em, rows, perRow) {
  let h = '';
  for (let r = 0; r < rows; r++) {
    h += `<div class="stage-group"><div class="stage-group-label">Gruppe ${r+1}</div>`;
    for (let i = 0; i < perRow; i++)
      h += `<span class="stage-item" style="animation-delay:${(r*perRow+i)*60}ms">${em}</span>`;
    h += `</div>`;
  }
  return h;
}
function stageDiv(em, total, groups) {
  const per = total / groups;
  let h = '';
  for (let g = 0; g < groups; g++) {
    h += `<div class="stage-group"><div class="stage-group-label">🐻 ${g+1}</div>`;
    for (let i = 0; i < per; i++)
      h += `<span class="stage-item" style="animation-delay:${(g*per+i)*65}ms">${em}</span>`;
    h += `</div>`;
  }
  return h;
}
function fmlHtml(a, op, b, result) {
  return `<span class="fml-num">${a}</span>
          <span class="fml-op">${op}</span>
          <span class="fml-num">${b}</span>
          <span class="fml-eq">=</span>
          <span class="fml-res">${result}</span>`;
}

// ===================== WEB SPEECH API =====================
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = 'de-DE';
  utter.rate  = 0.88;
  utter.pitch = 1.1;
  const btn = document.getElementById('btn-speak');
  if (btn) {
    btn.classList.add('speaking');
    utter.onend  = () => btn.classList.remove('speaking');
    utter.onerror = () => btn.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utter);
}
if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// ===================== CONFIG =====================
const QUESTIONS_PER_ROUND = 10;

const LEVEL_RANGES = {
  1: { min: 1, max: 10 },
  2: { min: 1, max: 20 },
  3: { min: 1, max: 100 },
};

const OP_SYMBOLS = { add: '+', sub: '−', mul: '×', div: '÷' };

const CORRECT_MESSAGES = [
  '🎉 Super gemacht!', '🌟 Richtig!', '🏆 Toll!', '🥳 Genial!',
  '✨ Wunderbar!', '🦸 Klasse!', '🎊 Bravo!', '🌈 Fantastisch!',
  '💪 Weiter so!', '🐣 Das war easy!',
];

const WRONG_MESSAGES = [
  '😅 Nicht ganz – versuch es nochmal!',
  '🙈 Knapp daneben – du schaffst das!',
  '💡 Fast! Die richtige Antwort war: ',
  '🤔 Nochmal nachdenken …',
  '🐢 Kein Stress – weiter!',
];

// ===================== STATE =====================
let state = {
  operation: 'add', level: 1, questions: [],
  current: 0, score: 0, errors: 0, waitingNext: false,
};

// ===================== ELEMENTS =====================
const screens = {
  start:   document.getElementById('screen-start'),
  explain: document.getElementById('screen-explain'),
  game:    document.getElementById('screen-game'),
  result:  document.getElementById('screen-result'),
};

const el = {
  levelBtns:     document.querySelectorAll('.level-btn'),
  opBtns:        document.querySelectorAll('.op-btn'),
  btnBack:       document.getElementById('btn-back'),
  score:         document.getElementById('score'),
  errors:        document.getElementById('errors'),
  progressBar:   document.getElementById('progress-bar'),
  qCurrent:      document.getElementById('q-current'),
  qTotal:        document.getElementById('q-total'),
  num1:          document.getElementById('num1'),
  opSymbol:      document.getElementById('op-symbol'),
  num2:          document.getElementById('num2'),
  answerInput:   document.getElementById('answer-input'),
  btnCheck:      document.getElementById('btn-check'),
  feedback:      document.getElementById('feedback'),
  npBtns:        document.querySelectorAll('.np-btn'),
  expChar:       document.getElementById('exp-char'),
  expOpTitle:    document.getElementById('exp-op-title'),
  expCounter:    document.getElementById('exp-example-counter'),
  expFormulaBig: document.getElementById('exp-formula-big'),
  expStage:      document.getElementById('exp-stage'),
  expDots:       document.getElementById('exp-dots'),
  btnSkip:       document.getElementById('btn-skip'),
  btnSpeak:      document.getElementById('btn-speak'),
  btnPrevStep:   document.getElementById('btn-prev-step'),
  btnNextStep:   document.getElementById('btn-next-step'),
  btnLetsGo:     document.getElementById('btn-lets-go'),
  resultEmoji:   document.getElementById('result-emoji'),
  resultTitle:   document.getElementById('result-title'),
  resultMsg:     document.getElementById('result-msg'),
  resCorrect:    document.getElementById('res-correct'),
  resErrors:     document.getElementById('res-errors'),
  resStars:      document.getElementById('res-stars'),
  btnRetry:      document.getElementById('btn-retry'),
  btnHome:       document.getElementById('btn-home'),
};

// ===================== SCREEN NAVIGATION =====================
function showScreen(name) {
  Object.entries(screens).forEach(([key, s]) => {
    s.classList.toggle('active', key === name);
  });
}

// ===================== LEVEL SELECT =====================
el.levelBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    el.levelBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.level = parseInt(btn.dataset.level);
  });
});

// ===================== OPERATION SELECT =====================
el.opBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    state.operation = btn.dataset.op;
    document.body.dataset.op = state.operation;
    showExplain();
  });
});

// ===================== ERKLÄRBILDSCHIRM =====================
let explainStep = 0;

function showExplain() {
  explainStep = 0;
  showScreen('explain');
  const data = EXPLAIN_DATA[state.operation];
  speak(data.intro);
  const introMs = Math.max(1800, data.intro.length * 55);
  setTimeout(() => renderExplainStep(true), introMs);
  renderExplainStep(false);
}

function renderExplainStep(autoSpeak) {
  const data     = EXPLAIN_DATA[state.operation];
  const examples = data.examples;
  const ex       = examples[explainStep];
  const isLast   = explainStep === examples.length - 1;

  el.expChar.textContent    = data.char;
  el.expOpTitle.textContent = data.title;
  el.expCounter.textContent = `Beispiel ${explainStep + 1} von ${examples.length}`;
  el.expFormulaBig.innerHTML = fmlHtml(ex.a, ex.op, ex.b, ex.result);
  el.expStage.innerHTML      = ex.stage;
  el.expDots.innerHTML = examples.map((_, i) =>
    `<div class="exp-dot ${i === explainStep ? 'active' : ''}"></div>`
  ).join('');
  el.btnPrevStep.disabled = explainStep === 0;
  el.btnNextStep.classList.toggle('hidden', isLast);
  el.btnLetsGo.classList.toggle('hidden', !isLast);
  if (autoSpeak) speak(ex.voice);
}

el.btnNextStep.addEventListener('click', () => {
  const max = EXPLAIN_DATA[state.operation].examples.length - 1;
  if (explainStep < max) { explainStep++; renderExplainStep(true); }
});
el.btnPrevStep.addEventListener('click', () => {
  if (explainStep > 0) { explainStep--; renderExplainStep(true); }
});
el.btnSpeak.addEventListener('click', () => {
  speak(EXPLAIN_DATA[state.operation].examples[explainStep].voice);
});
el.btnLetsGo.addEventListener('click', () => {
  window.speechSynthesis && window.speechSynthesis.cancel();
  startGame();
});
el.btnSkip.addEventListener('click', () => {
  window.speechSynthesis && window.speechSynthesis.cancel();
  startGame();
});

// ===================== QUESTION GENERATION =====================
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateQuestion(op, level) {
  const { min, max } = LEVEL_RANGES[level];
  let a, b, answer;
  const actualOp = op === 'mix'
    ? ['add', 'sub', 'mul', 'div'][Math.floor(Math.random() * 4)]
    : op;

  switch (actualOp) {
    case 'add': a = rand(min, max); b = rand(min, max); answer = a + b; break;
    case 'sub': a = rand(min, max); b = rand(min, a);   answer = a - b; break;
    case 'mul': a = rand(1, Math.min(max, 10)); b = rand(1, Math.min(max, 10)); answer = a * b; break;
    case 'div': b = rand(1, Math.min(max, 10)); answer = rand(1, Math.min(max, 10)); a = b * answer; break;
  }
  return { a, b, op: actualOp, answer };
}

function generateQuestions() {
  const qs = [];
  for (let i = 0; i < QUESTIONS_PER_ROUND; i++)
    qs.push(generateQuestion(state.operation, state.level));
  return qs;
}

// ===================== GAME START =====================
function startGame() {
  state.questions   = generateQuestions();
  state.current     = 0;
  state.score       = 0;
  state.errors      = 0;
  state.waitingNext = false;
  document.body.dataset.op = state.operation;
  el.qTotal.textContent = QUESTIONS_PER_ROUND;
  updateScoreDisplay();
  showScreen('game');
  loadQuestion();
  el.answerInput.focus();
}

function loadQuestion() {
  const q = state.questions[state.current];
  el.qCurrent.textContent = state.current + 1;
  el.num1.textContent     = q.a;
  el.opSymbol.textContent = OP_SYMBOLS[q.op];
  el.num2.textContent     = q.b;
  el.answerInput.value    = '';
  el.feedback.className   = 'feedback hidden';
  el.feedback.textContent = '';
  state.waitingNext       = false;
  updateProgress();
  el.answerInput.focus();
}

function updateProgress() {
  el.progressBar.style.width = (state.current / QUESTIONS_PER_ROUND * 100) + '%';
}
function updateScoreDisplay() {
  el.score.textContent  = state.score;
  el.errors.textContent = state.errors;
}

// ===================== CHECK ANSWER =====================
function checkAnswer() {
  if (state.waitingNext) { nextQuestion(); return; }
  const val = el.answerInput.value.trim();
  if (val === '') { el.answerInput.focus(); return; }
  const userAnswer = parseInt(val, 10);
  const correct    = state.questions[state.current].answer;

  if (userAnswer === correct) {
    state.score++;
    showFeedback(true, '');
  } else {
    state.errors++;
    const msg   = WRONG_MESSAGES[Math.floor(Math.random() * WRONG_MESSAGES.length)];
    const extra = msg.includes('war:') ? correct : '';
    showFeedback(false, msg + (extra !== '' ? ' ' + extra : ''));
  }
  updateScoreDisplay();
  state.waitingNext = true;
  setTimeout(() => { if (state.waitingNext) nextQuestion(); }, 1400);
}

function showFeedback(isCorrect, msg) {
  el.feedback.className   = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  el.feedback.textContent = isCorrect
    ? CORRECT_MESSAGES[Math.floor(Math.random() * CORRECT_MESSAGES.length)]
    : msg;
}

function nextQuestion() {
  state.current++;
  if (state.current >= QUESTIONS_PER_ROUND) showResult();
  else loadQuestion();
}

// ===================== RESULT SCREEN =====================
function showResult() {
  const pct = state.score / QUESTIONS_PER_ROUND;
  let emoji, title, msg;
  if      (pct === 1)   { emoji = '🏆'; title = 'Perfekt!';        msg = 'Alle richtig – du bist ein Mathe-Genie!'; }
  else if (pct >= 0.8)  { emoji = '🌟'; title = 'Super!';          msg = 'Toll gemacht! Fast alles richtig!'; }
  else if (pct >= 0.6)  { emoji = '😊'; title = 'Gut!';            msg = 'Schon gut! Noch ein bisschen üben!'; }
  else if (pct >= 0.4)  { emoji = '💪'; title = 'Weiter üben!';    msg = 'Du schaffst das! Probier es nochmal!'; }
  else                  { emoji = '🐢'; title = 'Nicht aufgeben!'; msg = 'Üben macht den Meister – nochmal versuchen!'; }

  el.resultEmoji.textContent = emoji;
  el.resultTitle.textContent = title;
  el.resultMsg.textContent   = msg;
  el.resCorrect.textContent  = state.score;
  el.resErrors.textContent   = state.errors;
  el.resStars.textContent    = state.score;
  el.progressBar.style.width = '100%';
  showScreen('result');
}

// ===================== BUTTONS =====================
el.btnCheck.addEventListener('click', checkAnswer);
el.btnBack.addEventListener('click', () => {
  showScreen('start');
  document.body.removeAttribute('data-op');
});
el.btnRetry.addEventListener('click', startGame);
el.btnHome.addEventListener('click', () => {
  showScreen('start');
  document.body.removeAttribute('data-op');
});
el.answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

// ===================== NUMPAD =====================
el.npBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    if (val === 'del') {
      el.answerInput.value = el.answerInput.value.slice(0, -1);
    } else {
      if (state.waitingNext) { nextQuestion(); return; }
      el.answerInput.value += val;
    }
    el.answerInput.focus();
  });
});
  </script>
