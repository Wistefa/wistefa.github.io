<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versicherungsübersicht</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  /* Login */
  #login-screen { position: fixed; inset: 0; background: #1e3a5f; z-index: 999; display: flex; align-items: center; justify-content: center; }
  #login-screen.hidden { display: none; }
  .login-box { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 360px; margin: 16px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .login-box .lock { font-size: 2.8rem; margin-bottom: 12px; }
  .login-box h2 { font-size: 1.3rem; font-weight: 700; color: #1e3a5f; margin-bottom: 6px; }
  .login-box p { font-size: 0.85rem; color: #718096; margin-bottom: 28px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #cbd5e0; transition: all .2s; }
  .pin-dot.filled { background: #1e3a5f; border-color: #1e3a5f; }
  .pin-dot.error { background: #e53e3e; border-color: #e53e3e; }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
  .pin-btn { background: #f7fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 16px; font-size: 1.3rem; font-weight: 700; color: #2d3748; cursor: pointer; transition: all .15s; }
  .pin-btn:hover { background: #ebf4ff; border-color: #1e3a5f; }
  .pin-btn:active { background: #1e3a5f; color: white; }
  .pin-btn.del { font-size: 1rem; color: #718096; }
  .login-error { color: #e53e3e; font-size: 0.82rem; margin-top: 14px; min-height: 18px; }
  .btn-change-pw { background: none; border: none; color: #a0aec0; font-size: 0.78rem; cursor: pointer; margin-top: 16px; text-decoration: underline; }

  /* Header */
  header { background: #1e3a5f; color: white; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
  header span { font-size: 0.85rem; opacity: 0.7; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .export-btns { display: flex; gap: 8px; }
  .btn-export { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 7px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
  .btn-export:hover { background: rgba(255,255,255,0.25); }
  .btn-persons { background: none; border: 1.5px solid rgba(255,255,255,0.3); color: white; border-radius: 7px; padding: 6px 12px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
  .btn-persons:hover { background: rgba(255,255,255,0.15); }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* Summary Cards */
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .card { background: white; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card .label { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .card .value { font-size: 1.5rem; font-weight: 700; color: #1e3a5f; }
  .card .sub { font-size: 0.75rem; color: #a0aec0; margin-top: 3px; }

  /* Filter */
  .filter-section { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filter-label { font-size: 0.75rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.6px; margin-right: 4px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.82rem; font-weight: 600; color: #4a5568; cursor: pointer; transition: all .15s; }
  .filter-btn.active { background: #1e3a5f; color: white; border-color: #1e3a5f; }

  /* Toolbar */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .toolbar-left { display: flex; gap: 8px; align-items: center; }
  .sort-select { padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.82rem; color: #4a5568; background: white; cursor: pointer; outline: none; }
  .sort-select:focus { border-color: #1e3a5f; }
  .btn-add { background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #2a4f7f; }

  /* Contract Card */
  .contract { background: white; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); display: flex; align-items: flex-start; gap: 14px; }
  .contract-icon { font-size: 1.6rem; width: 40px; text-align: center; flex-shrink: 0; margin-top: 2px; }
  .contract-body { flex: 1; min-width: 0; }
  .contract-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .contract-name { font-weight: 700; font-size: 1rem; }
  .contract-company { font-size: 0.82rem; color: #718096; }
  .contract-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; background: #f0f4f8; color: #4a5568; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-weight: 600; }
  .badge.person { background: #ebf4ff; color: #2b6cb0; }
  .badge.expiry { background: #fff5f5; color: #c53030; }
  .badge.expiry-warn { background: #fffaf0; color: #c05621; }
  .contract-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .contract-premium { font-size: 1.05rem; font-weight: 700; color: #c53030; }
  .contract-premium-sub { font-size: 0.72rem; color: #a0aec0; }
  .contract-actions { display: flex; gap: 4px; margin-top: 6px; }
  .btn-icon { background: none; border: none; cursor: pointer; color: #cbd5e0; font-size: 1rem; padding: 4px 6px; border-radius: 6px; }
  .btn-icon:hover { background: #f0f4f8; color: #4a5568; }

  .empty { text-align: center; color: #a0aec0; padding: 48px 0; font-size: 0.9rem; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 24px 16px; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; margin: auto; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 22px; color: #1a202c; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.82rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.93rem; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #1e3a5f; }
  .field textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex: 1; background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 11px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
  .btn-cancel { flex: 1; background: #edf2f7; color: #4a5568; border: none; border-radius: 8px; padding: 11px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }

  /* Persons modal */
  .person-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f4f8; }
  .btn-del-person { background: none; border: none; color: #cbd5e0; cursor: pointer; font-size: 1rem; }
  .btn-del-person:hover { color: #e53e3e; }

  @media (max-width: 640px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .field-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="lock">🔒</div>
    <h2 id="login-title">Willkommen</h2>
    <p id="login-subtitle">Bitte PIN eingeben</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>
      <button class="pin-btn" onclick="pinInput('8')">8</button>
      <button class="pin-btn" onclick="pinInput('9')">9</button>

    </div>

</div>

<header>
  <h1>🛡️ Versicherungsübersicht</h1>
  <div class="header-right">
    <span id="datum"></span>
    <div class="export-btns">
      <button class="btn-persons" onclick="openPersonsModal()">👤 Personen</button>
      <button class="btn-export" onclick="exportCSV()">CSV</button>
      <button class="btn-export" onclick="exportPDF()">PDF</button>
      <button class="btn-export" onclick="saveData()">☁️ Speichern</button>
      <button class="btn-export" onclick="document.getElementById('file-load').click()">☁️ Laden</button>
      <input type="file" id="file-load" accept=".json" style="display:none" onchange="loadData(event)">
    </div>
  </div>
</header>

<div class="container">

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card">
      <div class="label">Verträge gesamt</div>
      <div class="value" id="sum-count">0</div>
    </div>
    <div class="card">
      <div class="label">Monatlich</div>
      <div class="value" id="sum-monthly">0 €</div>
    </div>
    <div class="card">
      <div class="label">Jährlich</div>
      <div class="value" id="sum-annual">0 €</div>
    </div>
    <div class="card">
      <div class="label">Bald ablaufend</div>
      <div class="value" id="sum-expiring" style="color:#c05621;">0</div>
      <div class="sub">innerhalb 90 Tage</div>
    </div>
  </div>

  <!-- Personen-Filter -->
  <div class="filter-section" id="filter-persons"></div>

  <!-- Kategorie-Filter -->
  <div class="filter-section" id="filter-cats"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <select class="sort-select" onchange="setSort(this.value)">
        <option value="none">Reihenfolge</option>
        <option value="cat">Kategorie A–Z</option>
        <option value="name">Name A–Z</option>
        <option value="company">Gesellschaft A–Z</option>
        <option value="premium-desc">Prämie ↓</option>
        <option value="premium-asc">Prämie ↑</option>
        <option value="expiry">Ablauf bald zuerst</option>
      </select>
    </div>
    <button class="btn-add" onclick="openModal()">+ Vertrag hinzufügen</button>
  </div>

  <!-- Liste -->
  <div id="list"></div>

</div>

<!-- Personen Modal -->
<div class="overlay" id="overlay-persons">
  <div class="modal">
    <h3>Personen verwalten</h3>
    <div id="persons-list" style="margin-bottom:16px; min-height:40px;"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="p-new-name" placeholder="Name eingeben" style="flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.95rem;outline:none;">
      <button class="btn-save" style="flex:0 0 auto;padding:9px 16px;" onclick="addPerson()">+</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePersonsModal()">Schließen</button>
    </div>
  </div>
</div>

<!-- Vertrag Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Vertrag hinzufügen</h3>
    <div class="field">
      <label>Bezeichnung</label>
      <input type="text" id="m-name" placeholder="z. B. Privathaftpflicht">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Kategorie</label>
        <select id="m-cat"></select>
      </div>
      <div class="field">
        <label>Person</label>
        <select id="m-person"></select>
      </div>
    </div>
    <div class="field">
      <label>Versicherungsgesellschaft</label>
      <input type="text" id="m-company" placeholder="z. B. Allianz">
    </div>
    <div class="field">
      <label>Vertragsnummer</label>
      <input type="text" id="m-contractno" placeholder="optional">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Prämie (€)</label>
        <input type="number" id="m-premium" placeholder="0" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Zahlungsweise</label>
        <select id="m-frequency">
          <option value="monatlich">monatlich</option>
          <option value="vierteljährlich">vierteljährlich</option>
          <option value="halbjährlich">halbjährlich</option>
          <option value="jährlich" selected>jährlich</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Vertragsbeginn</label>
        <input type="date" id="m-start">
      </div>
      <div class="field">
        <label>Vertragsende / Ablauf</label>
        <input type="date" id="m-end">
      </div>
    </div>
    <div class="field">
      <label>Versicherungssumme / Deckung</label>
      <input type="text" id="m-coverage" placeholder="z. B. 10.000.000 €">
    </div>
    <div class="field">
      <label>Notizen</label>
      <textarea id="m-notes" placeholder="z. B. Selbstbehalt, besondere Klauseln …"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveItem()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── PIN Login ──────────────────────────────────────────
let pinEntry = "";
let pinMode = "login";
let pinNewTemp = "";

async function hashPIN(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

let currentPin = "";
const _b64e = a => btoa(String.fromCharCode(...new Uint8Array(a)));
const _b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function _deriveKey(pin, salt) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}

function _defaultData() {
  return {contracts:[], persons:["Ich","Ehefrau","Kind 1","Kind 2","Gemeinsam"]};
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function pinInput(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updateDots();
  if (pinEntry.length === 4) setTimeout(checkPIN, 120);
}
function pinDelete() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
function updateDots(state) {
  for (let i=0;i<4;i++) {
    const d = document.getElementById("dot-"+i);
    d.className = "pin-dot"+(i<pinEntry.length?" filled":"")+(state==="error"?" error":"");
  }
}
async function checkPIN() {
  const stored = localStorage.getItem("vs_pin");
  if (pinMode === "set-new") {
    pinNewTemp = pinEntry; pinEntry = ""; pinMode = "confirm-new";
    document.getElementById("login-title").textContent = "PIN bestätigen";
    document.getElementById("login-subtitle").textContent = "PIN nochmals eingeben";
    updateDots(); return;
  }
  if (pinMode === "confirm-new") {
    if (pinEntry === pinNewTemp) {
      const h = await hashPIN(pinEntry);
      localStorage.setItem("vs_pin", h);
      currentPin = pinEntry;
      await save();
      pinMode = "login"; pinEntry = ""; await unlockApp();
    } else { showPINError("PINs stimmen nicht überein"); }
    return;
  }
  if (!stored) { currentPin = pinEntry; await unlockApp(); return; }
  const h = await hashPIN(pinEntry);
  if (h === stored) { currentPin = pinEntry; await unlockApp(); } else { showPINError("Falsche PIN"); }
}
function showPINError(msg) {
  updateDots("error");
  document.getElementById("login-error").textContent = msg;
  setTimeout(() => { pinEntry=""; updateDots(); document.getElementById("login-error").textContent=""; }, 900);
}
async function unlockApp() {
  if (data === null) {
    const raw = localStorage.getItem('vs_data');
    if (raw) {
      try {
        const stored = JSON.parse(raw);
        if (stored.v === 2) {
          const key = await _deriveKey(currentPin, _b64d(stored.s));
          const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:_b64d(stored.i)}, key, _b64d(stored.d));
          data = JSON.parse(new TextDecoder().decode(plain));
        } else {
          data = stored; // old plaintext → migrate
        }
      } catch { data = _defaultData(); }
    } else {
      data = _defaultData();
    }
    if (!data.persons) data.persons = ["Ich","Ehefrau","Kind 1","Kind 2","Gemeinsam"];
    if (!data.contracts) data.contracts = [];
    await save();
  }
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("btn-change-pw").style.display = "";
  render();
}
function startChangePIN() {
  pinEntry=""; pinMode="set-new"; pinNewTemp="";
  document.getElementById("login-title").textContent = "Neue PIN";
  document.getElementById("login-subtitle").textContent = "Neue 4-stellige PIN wählen";
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-screen").classList.remove("hidden");
  updateDots();
}
(async () => {
  const stored = localStorage.getItem("vs_pin");
  if (!stored) {
    pinMode = "set-new";
    document.getElementById("login-title").textContent = "PIN festlegen";
    document.getElementById("login-subtitle").textContent = "Wähle eine 4-stellige PIN";
  }
})();
document.addEventListener("keydown", e => {
  if (!document.getElementById("login-screen").classList.contains("hidden")) {
    if (e.key >= "0" && e.key <= "9") pinInput(e.key);
    if (e.key === "Backspace") pinDelete();
  }
});
// ───────────────────────────────────────────────────────

const CATS = [
  { label: "Krankenversicherung",           icon: "🏥" },
  { label: "Zahnzusatzversicherung",        icon: "🦷" },
  { label: "Pflegeversicherung",            icon: "👴" },
  { label: "Haftpflichtversicherung",       icon: "🛡️" },
  { label: "Kfz-Versicherung",             icon: "🚗" },
  { label: "Hausratversicherung",           icon: "🏠" },
  { label: "Wohngebäudeversicherung",       icon: "🏘️" },
  { label: "Lebensversicherung",            icon: "💙" },
  { label: "Berufsunfähigkeitsversicherung",icon: "💼" },
  { label: "Unfallversicherung",            icon: "🚑" },
  { label: "Rechtsschutzversicherung",      icon: "⚖️" },
  { label: "Reiseversicherung",             icon: "✈️" },
  { label: "Rentenversicherung",            icon: "🧓" },
  { label: "Tierversicherung",              icon: "🐾" },
  { label: "Cyberversicherung",             icon: "🔐" },
  { label: "Sonstiges",                     icon: "📋" },
];

let data = null; // loaded after PIN unlock

let filterPerson = "alle";
let filterCat = "alle";
let sortMode = "none";
let editIndex = -1;

// ── Personen ──────────────────────────────────────────
function openPersonsModal() { renderPersonsList(); document.getElementById("overlay-persons").classList.add("open"); }
function closePersonsModal() { document.getElementById("overlay-persons").classList.remove("open"); render(); }
function renderPersonsList() {
  const el = document.getElementById("persons-list");
  el.innerHTML = data.persons.map((p,i) => `
    <div class="person-list-item">
      <span>${esc(p)}</span>
      <button class="btn-del-person" data-i="${i}">✕</button>
    </div>`).join("") || '<p style="color:#a0aec0;font-size:0.85rem;">Keine Personen</p>';
  el.querySelectorAll('.btn-del-person').forEach(b => b.addEventListener('click', () => deletePerson(+b.dataset.i)));
}
async function addPerson() {
  const name = document.getElementById("p-new-name").value.trim();
  if (!name) return;
  data.persons.push(name); await save();
  document.getElementById("p-new-name").value = "";
  renderPersonsList();
}
async function deletePerson(i) { data.persons.splice(i,1); await save(); renderPersonsList(); }
document.getElementById("overlay-persons").addEventListener("click", e => { if (e.target===e.currentTarget) closePersonsModal(); });
document.getElementById("p-new-name").addEventListener("keydown", e => { if (e.key==="Enter") addPerson(); });
// ─────────────────────────────────────────────────────

async function save() {
  if (!currentPin || data === null) return;
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await _deriveKey(currentPin, salt);
  const ct   = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(JSON.stringify(data)));
  localStorage.setItem('vs_data', JSON.stringify({v:2, s:_b64e(salt), i:_b64e(iv), d:_b64e(ct)}));
}

function fmt(n) {
  return new Intl.NumberFormat("de-DE", { style:"currency", currency:"EUR", maximumFractionDigits:2 }).format(n);
}

function annualPremium(item) {
  const freq = { monatlich:12, vierteljährlich:4, halbjährlich:2, jährlich:1 };
  return item.premium * (freq[item.frequency] || 1);
}

function monthlyPremium(item) { return annualPremium(item) / 12; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

function catInfo(label) { return CATS.find(c => c.label === label) || { icon: "📋" }; }

function setSort(val) { sortMode = val; render(); }

function getSorted() {
  let items = data.contracts.map((c,i) => ({...c, _i:i}));
  if (filterPerson !== "alle") items = items.filter(c => (c.person||"") === filterPerson);
  if (filterCat !== "alle") items = items.filter(c => c.cat === filterCat);
  if (sortMode === "cat")          items.sort((a,b) => a.cat.localeCompare(b.cat));
  if (sortMode === "name")         items.sort((a,b) => a.name.localeCompare(b.name));
  if (sortMode === "company")      items.sort((a,b) => (a.company||"").localeCompare(b.company||""));
  if (sortMode === "premium-desc") items.sort((a,b) => annualPremium(b) - annualPremium(a));
  if (sortMode === "premium-asc")  items.sort((a,b) => annualPremium(a) - annualPremium(b));
  if (sortMode === "expiry")       items.sort((a,b) => {
    const da = daysUntil(a.endDate) ?? 99999;
    const db = daysUntil(b.endDate) ?? 99999;
    return da - db;
  });
  return items;
}

function render() {
  // Filter-Buttons Personen
  const fpEl = document.getElementById("filter-persons");
  fpEl.innerHTML = `<span class="filter-label">Person:</span>` +
    ["alle", ...data.persons].map(p => `<button class="filter-btn ${filterPerson===p?'active':''}" data-p="${esc(p)}">${p==="alle"?"Alle":esc(p)}</button>`).join("");
  fpEl.querySelectorAll('.filter-btn[data-p]').forEach(b => b.addEventListener('click', () => setFilterPerson(b.dataset.p)));

  // Filter-Buttons Kategorien
  const usedCats = [...new Set(data.contracts.map(c => c.cat))].sort();
  const fcEl = document.getElementById("filter-cats");
  fcEl.innerHTML = usedCats.length > 1
    ? `<span class="filter-label">Kategorie:</span>` +
      ["alle", ...usedCats].map(c => `<button class="filter-btn ${filterCat===c?'active':''}" data-c="${esc(c)}">${c==="alle"?"Alle Kategorien":esc(c)}</button>`).join("")
    : "";
  fcEl.querySelectorAll('.filter-btn[data-c]').forEach(b => b.addEventListener('click', () => setFilterCat(b.dataset.c)));

  const items = getSorted();

  // Summary
  const allFiltered = data.contracts.filter(c =>
    (filterPerson==="alle" || (c.person||"")===filterPerson) &&
    (filterCat==="alle" || c.cat===filterCat)
  );
  const totalAnnual = allFiltered.reduce((s,c) => s + annualPremium(c), 0);
  const expiring = allFiltered.filter(c => { const d=daysUntil(c.endDate); return d!==null && d>=0 && d<=90; }).length;
  document.getElementById("sum-count").textContent = allFiltered.length;
  document.getElementById("sum-monthly").textContent = fmt(totalAnnual/12);
  document.getElementById("sum-annual").textContent = fmt(totalAnnual);
  document.getElementById("sum-expiring").textContent = expiring;

  // Liste
  const el = document.getElementById("list");
  if (!items.length) { el.innerHTML = '<div class="empty">Keine Versicherungsverträge vorhanden</div>'; return; }

  el.innerHTML = items.map(item => {
    const ci = catInfo(item.cat);
    const days = daysUntil(item.endDate);
    const expiryBadge = item.endDate
      ? days < 0
        ? `<span class="badge expiry">Abgelaufen</span>`
        : days <= 90
          ? `<span class="badge expiry-warn">⚠️ Läuft ab in ${days} Tagen</span>`
          : `<span class="badge">bis ${new Date(item.endDate).toLocaleDateString("de-DE")}</span>`
      : "";
    const annual = annualPremium(item);
    return `
    <div class="contract">
      <div class="contract-icon">${ci.icon}</div>
      <div class="contract-body">
        <div class="contract-top">
          <span class="contract-name">${esc(item.name)}</span>
          <span class="contract-company">${esc(item.company||"")}</span>
        </div>
        <div class="contract-meta">
          <span class="badge">${esc(item.cat)}</span>
          ${item.person ? `<span class="badge person">${esc(item.person)}</span>` : ""}
          ${item.contractno ? `<span class="badge">Nr. ${esc(item.contractno)}</span>` : ""}
          ${item.startDate ? `<span class="badge">ab ${new Date(item.startDate).toLocaleDateString("de-DE")}</span>` : ""}
          ${expiryBadge}
          ${item.coverage ? `<span class="badge">🔒 ${esc(item.coverage)}</span>` : ""}
        </div>
        ${item.notes ? `<div style="font-size:0.78rem;color:#718096;margin-top:6px;">${esc(item.notes)}</div>` : ""}
      </div>
      <div class="contract-right">
        <div class="contract-premium">${fmt(item.premium)}</div>
        <div class="contract-premium-sub">${item.frequency}</div>
        <div class="contract-premium-sub" style="color:#4a5568;">${fmt(annual)} / Jahr</div>
        <div class="contract-actions">
          <button class="btn-icon" title="Bearbeiten" onclick="openModal(${item._i})">✏️</button>
          <button class="btn-icon" title="Löschen" onclick="deleteItem(${item._i})">✕</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function setFilterPerson(p) { filterPerson = p; render(); }
function setFilterCat(c) { filterCat = c; render(); }

function openModal(idx = -1) {
  editIndex = idx;
  const isEdit = idx >= 0;
  document.getElementById("modal-title").textContent = isEdit ? "Vertrag bearbeiten" : "Vertrag hinzufügen";

  const catSel = document.getElementById("m-cat");
  catSel.innerHTML = CATS.map(c => `<option>${c.label}</option>`).join("");
  const pSel = document.getElementById("m-person");
  pSel.innerHTML = data.persons.map(p => `<option>${p}</option>`).join("");

  if (isEdit) {
    const c = data.contracts[idx];
    document.getElementById("m-name").value = c.name || "";
    document.getElementById("m-company").value = c.company || "";
    document.getElementById("m-contractno").value = c.contractno || "";
    document.getElementById("m-premium").value = c.premium || "";
    document.getElementById("m-coverage").value = c.coverage || "";
    document.getElementById("m-notes").value = c.notes || "";
    document.getElementById("m-start").value = c.startDate || "";
    document.getElementById("m-end").value = c.endDate || "";
    catSel.value = c.cat;
    pSel.value = c.person || data.persons[0] || "";
    document.getElementById("m-frequency").value = c.frequency || "jährlich";
  } else {
    document.getElementById("m-name").value = "";
    document.getElementById("m-company").value = "";
    document.getElementById("m-contractno").value = "";
    document.getElementById("m-premium").value = "";
    document.getElementById("m-coverage").value = "";
    document.getElementById("m-notes").value = "";
    document.getElementById("m-start").value = new Date().toISOString().slice(0,10);
    document.getElementById("m-end").value = "";
    catSel.value = CATS[0].label;
    pSel.value = filterPerson !== "alle" ? filterPerson : (data.persons[0] || "");
    document.getElementById("m-frequency").value = "jährlich";
  }
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("m-name").focus(), 100);
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

async function saveItem() {
  const name = document.getElementById("m-name").value.trim();
  const premium = parseFloat(document.getElementById("m-premium").value);
  if (!name) { document.getElementById("m-name").focus(); return; }
  if (!premium || premium < 0) { document.getElementById("m-premium").focus(); return; }
  const entry = {
    name,
    cat: document.getElementById("m-cat").value,
    person: document.getElementById("m-person").value,
    company: document.getElementById("m-company").value.trim(),
    contractno: document.getElementById("m-contractno").value.trim(),
    premium,
    frequency: document.getElementById("m-frequency").value,
    startDate: document.getElementById("m-start").value,
    endDate: document.getElementById("m-end").value,
    coverage: document.getElementById("m-coverage").value.trim(),
    notes: document.getElementById("m-notes").value.trim(),
  };
  if (editIndex >= 0) { data.contracts[editIndex] = entry; }
  else { data.contracts.push(entry); }
  await save(); render(); closeModal();
}

async function deleteItem(i) {
  if (!confirm(`"${data.contracts[i].name}" wirklich löschen?`)) return;
  data.contracts.splice(i,1); await save(); render();
}

// ── Export ────────────────────────────────────────────
function saveData() {
  const blob = new Blob([JSON.stringify(data,null,2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="versicherungen.json"; a.click();
  URL.revokeObjectURL(url);
}
function loadData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const loaded = JSON.parse(e.target.result);
      if (!loaded.contracts) throw new Error();
      data = loaded; save(); render();
      alert("Daten erfolgreich geladen.");
    } catch { alert("Fehler: Ungültige Datei."); }
    event.target.value = "";
  };
  reader.readAsText(file);
}

function exportCSV() {
  const rows = [["Kategorie","Bezeichnung","Gesellschaft","Vertragsnr.","Person","Prämie (€)","Zahlungsweise","Jährlich (€)","Beginn","Ablauf","Versicherungssumme","Notizen"]];
  data.contracts.forEach(c => rows.push([
    c.cat, c.name, c.company||"", c.contractno||"", c.person||"",
    c.premium.toFixed(2), c.frequency, annualPremium(c).toFixed(2),
    c.startDate||"", c.endDate||"", c.coverage||"", c.notes||""
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="versicherungen.csv"; a.click();
  URL.revokeObjectURL(url);
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const today = new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});
  const pageW = 210;
  doc.setFillColor(30,58,95);
  doc.rect(0,0,pageW,28,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont("helvetica","bold");
  doc.text("Versicherungsübersicht", 14, 13);
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text(today, 14, 22);

  const total = data.contracts.reduce((s,c) => s+annualPremium(c), 0);
  doc.setTextColor(30,58,95); doc.setFontSize(10); doc.setFont("helvetica","bold");
  doc.text(`Verträge: ${data.contracts.length}`, 14, 38);
  doc.text(`Jährliche Gesamtprämie: ${fmt(total)}`, 70, 38);
  doc.setDrawColor(200,200,200); doc.line(14,43,pageW-14,43);

  let y = 52;
  const grouped = {};
  data.contracts.forEach(c => { (grouped[c.cat] = grouped[c.cat]||[]).push(c); });

  Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).forEach(([cat, items]) => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,58,95);
    doc.text(cat, 14, y); y += 7;
    doc.setFontSize(8.5); doc.setFont("helvetica","normal");
    items.forEach((item, idx) => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFillColor(idx%2===0?247:255, idx%2===0?250:255, idx%2===0?252:255);
      doc.rect(14,y-5,pageW-28,8,"F");
      doc.setTextColor(40,40,40); doc.text(item.name, 16, y);
      doc.setTextColor(100,100,100); doc.text(item.company||"", 75, y);
      doc.text(item.person||"", 125, y);
      doc.setTextColor(197,48,48); doc.setFont("helvetica","bold");
      doc.text(fmt(annualPremium(item))+"/J", pageW-14, y, {align:"right"});
      doc.setFont("helvetica","normal");
      y += 9;
    });
    y += 4;
  });

  doc.setFontSize(8); doc.setTextColor(160,160,160);
  doc.text("Erstellt am "+today, pageW/2, 290, {align:"center"});
  doc.save("versicherungen.pdf");
}

document.getElementById("datum").textContent = new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"});
document.getElementById("overlay").addEventListener("click", e => { if (e.target===e.currentTarget) closeModal(); });
function fabToggle(){const p=document.getElementById('fab-panel');p.style.display=p.style.display==='none'?'block':'none';}
function fabDownload(obj,name){const json=JSON.stringify(obj,null,2);const blob=new Blob([json],{type:'application/json'});const fn=name.replace(/[^a-zA-Z0-9äöüÄÖÜß _-]/g,'_')+'.json';if(navigator.share&&navigator.canShare?.({files:[new File([blob],fn)]})){navigator.share({files:[new File([blob],fn,{type:'application/json'})]});}else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();URL.revokeObjectURL(a.href);}}
function fabExport(){const name=document.getElementById('fab-name').value.trim()||'Versicherungen_'+new Date().toLocaleDateString('de-DE').replace(/\./g,'-');fabDownload({version:'1.0',savedAt:new Date().toISOString(),name,data},name);}
function fabImport(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>4*1024*1024){alert('Datei zu groß (max. 4 MB).');input.value='';return;}
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const obj=JSON.parse(e.target.result);
      const raw=obj.data||obj;
      if(!Array.isArray(raw?.contracts)) throw new Error('Ungültiges Format');
      const num=v=>isFinite(parseFloat(v))?parseFloat(v):0;
      const FREQS=['monatlich','vierteljährlich','halbjährlich','jährlich'];
      data={
        contracts: raw.contracts.slice(0,5000).map(c=>({
          name:       String(c.name||'').slice(0,200),
          cat:        String(c.cat||'').slice(0,100),
          person:     String(c.person||'').slice(0,100),
          company:    String(c.company||'').slice(0,200),
          contractno: String(c.contractno||'').slice(0,100),
          premium:    num(c.premium),
          frequency:  FREQS.includes(c.frequency)?c.frequency:'jährlich',
          startDate:  String(c.startDate||'').slice(0,10),
          endDate:    String(c.endDate||'').slice(0,10),
          coverage:   String(c.coverage||'').slice(0,200),
          notes:      String(c.notes||'').slice(0,1000),
        })),
        persons: (raw.persons||[]).slice(0,100).map(p=>String(p).slice(0,100)),
      };
      await save();filterPerson='alle';filterCat='alle';render();
      document.getElementById('fab-panel').style.display='none';
    }catch{alert('Datei konnte nicht geladen werden.');}
  };
  r.readAsText(file);input.value='';
}
