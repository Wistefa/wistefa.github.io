    function TripDetail({ trip, onUpdate, onBack, onDelete, route, onSaveRoute }) {
      const [tab, setTab] = useState("timeline");
      const [showEventForm, setShowEventForm] = useState(false);
      const [showDocForm, setShowDocForm] = useState(false);
      const [editEvent, setEditEvent] = useState(null);
      const [editDoc, setEditDoc] = useState(null);
      const [showTripForm, setShowTripForm] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [showBookingImport, setShowBookingImport] = useState(false);
      const [detectedBooking, setDetectedBooking] = useState(null);
      const [pendingEmailDoc, setPendingEmailDoc] = useState(null);
      const bookingImportRef = useRef(null);

      const saveEvent = (ev) => {
        const events = trip.events||[];
        const idx = events.findIndex(e=>e.id===ev.id);
        const next = idx>=0 ? events.map(e=>e.id===ev.id?ev:e) : [...events,ev];
        onUpdate({...trip, events:next});
      };

      const deleteEvent = (id) => {
        onUpdate({...trip, events:(trip.events||[]).filter(e=>e.id!==id)});
      };

      const saveDoc = (d) => {
        const docs = trip.documents||[];
        const idx = docs.findIndex(x=>x.id===d.id);
        const next = idx>=0 ? docs.map(x=>x.id===d.id?d:x) : [...docs,d];
        onUpdate({...trip, documents:next});
      };

      const deleteDoc = (id) => {
        onUpdate({...trip, documents:(trip.documents||[]).filter(d=>d.id!==id)});
      };

      const handleBookingEml = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = "";
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const { subject, from, dateStr, body } = parseEml(ev.target.result);
            const detected = detectBookingFromEmail(subject, body);
            if (detected.detected) {
              setPendingEmailDoc({ type:"email", title:subject||"Buchungsbestätigung", emailFrom:from, emailDate:dateStr, emailBody:body });
              setDetectedBooking(detected);
              setShowBookingImport(true);
            } else {
              alert("Keine Buchung erkannt. Tipp: Nutze den Dokumente-Tab, um die E-Mail manuell zu speichern.");
            }
          } catch {
            alert("Datei konnte nicht gelesen werden.");
          }
        };
        reader.readAsText(file, "utf-8");
      };

      const handleBookingConfirm = (data) => {
        const newEvent = {
          id:uid(), type:data.type, title:data.title,
          startDate:data.startDate, startTime:data.startTime,
          endDate:data.endDate, endTime:data.endTime,
          location:data.location, confirmation:data.confirmation,
          kosten: data.costEur || data.cost,
          kostenOrig: (data.currency && data.currency !== "EUR") ? data.cost : "",
          kostenWaehrung: data.currency || "EUR",
          note:"", photos:[], pdfs:[], gpxFiles:[]
        };
        // Alles in einem einzigen onUpdate zusammenfassen,
        // sonst überschreibt das zweite Update das erste.
        const updatedEvents = [...(trip.events||[]), newEvent];
        const updatedDocs = pendingEmailDoc
          ? [...(trip.documents||[]), { id:uid(), ...pendingEmailDoc }]
          : (trip.documents||[]);
        onUpdate({ ...trip, events:updatedEvents, documents:updatedDocs });
        setShowBookingImport(false);
        setPendingEmailDoc(null);
        setDetectedBooking(null);
      };

      const sortedEvents = [...(trip.events||[])].sort((a,b)=>{
        if (a.startDate<b.startDate) return -1;
        if (a.startDate>b.startDate) return 1;
        if ((a.startTime||"")<(b.startTime||"")) return -1;
        return 1;
      });

      const groupedEvents = sortedEvents.reduce((acc, ev) => {
        const k = ev.startDate||"Kein Datum";
        if (!acc[k]) acc[k] = [];
        acc[k].push(ev);
        return acc;
      }, {});

      const totalDays = (trip.startDate && trip.endDate) ? Math.ceil((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1 : null;
      const prog = tripProgress(trip.startDate, trip.endDate);
      const isActive = prog > 0 && prog < 100;

      return (
        <div style={{minHeight:"100vh",background:"#0A0E14",paddingBottom:40}}>
          <div style={{background:`linear-gradient(135deg, ${trip.color}33, ${trip.color}11)`,
            borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"16px 20px 0"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",
                color:"#F0EDE6",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:18}}>
                ←
              </button>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,
                  fontWeight:700,color:"#F0EDE6"}}>{trip.name}</div>
                {trip.destination && <div style={{fontSize:13,color:"#7A8899"}}>🌍 {trip.destination}</div>}
              </div>
              <button onClick={()=>setShowTripForm(true)} style={{background:"rgba(255,255,255,0.08)",
                border:"none",color:"#aaa",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:15}}>
                ✏️
              </button>
            </div>

            <div style={{display:"flex",gap:20,marginBottom:16,flexWrap:"wrap"}}>
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"10px 14px",flex:1,minWidth:80}}>
                <div style={{fontSize:10,color:"#7A8899",fontWeight:600,letterSpacing:0.5}}>ABREISE</div>
                <div style={{fontSize:13,color:"#F0EDE6",marginTop:2,fontWeight:600}}>{formatDate(trip.startDate)}</div>
              </div>
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"10px 14px",flex:1,minWidth:80}}>
                <div style={{fontSize:10,color:"#7A8899",fontWeight:600,letterSpacing:0.5}}>RÜCKKEHR</div>
                <div style={{fontSize:13,color:"#F0EDE6",marginTop:2,fontWeight:600}}>{formatDate(trip.endDate)}</div>
              </div>
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"10px 14px",minWidth:70,textAlign:"center"}}>
                <div style={{fontSize:10,color:"#7A8899",fontWeight:600,letterSpacing:0.5}}>DAUER</div>
                <div style={{fontSize:16,color:trip.color,marginTop:2,fontWeight:700}}>{totalDays ?? "–"}</div>
                <div style={{fontSize:10,color:"#7A8899"}}>{totalDays ? "Tage" : ""}</div>
              </div>
            </div>

            {isActive && (
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#7A8899"}}>Reise läuft</span>
                  <span style={{fontSize:12,color:trip.color,fontWeight:700}}>{prog}%</span>
                </div>
                <div style={{background:"rgba(255,255,255,0.08)",borderRadius:6,height:6}}>
                  <div style={{background:trip.color,height:"100%",width:`${prog}%`,borderRadius:6}} />
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
              {[["timeline","Zeitplan"],["documents","Dokumente"],["route","Route"],["info","Info"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTab(k)} style={{
                  background:"none",border:"none",color:tab===k?"#F0EDE6":"#7A8899",
                  padding:"10px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:14,
                  fontWeight:tab===k?700:400,borderBottom:tab===k?`2px solid ${trip.color}`:"2px solid transparent",
                  transition:"color .15s"
                }}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:"20px"}}>

            {tab==="timeline" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <span style={{fontSize:13,color:"#7A8899"}}>{(trip.events||[]).length} Einträge</span>
                  <div style={{display:"flex",gap:8}}>
                    <input ref={bookingImportRef} type="file" accept=".eml,message/rfc822"
                      style={{display:"none"}} onChange={handleBookingEml} />
                    <Btn onClick={()=>bookingImportRef.current?.click()} small variant="secondary">📧 Buchung</Btn>
                    <Btn onClick={()=>{setEditEvent(null);setShowEventForm(true);}} small>+ Eintrag</Btn>
                  </div>
                </div>
                {Object.keys(groupedEvents).length===0 ? (
                  <div style={{textAlign:"center",padding:"48px 0",color:"#7A8899"}}>
                    <div style={{fontSize:36,marginBottom:12}}>📅</div>
                    <div style={{fontSize:15,marginBottom:6}}>Noch keine Einträge</div>
                    <div style={{fontSize:13}}>Füge Flüge, Hotels und Aktivitäten hinzu</div>
                  </div>
                ) : Object.entries(groupedEvents).map(([date, evs])=>(
                  <div key={date} style={{marginBottom:24}}>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:1,
                      color:"#7A8899",textTransform:"uppercase",marginBottom:10,
                      display:"flex",alignItems:"center",gap:8}}>
                      <div style={{height:1,flex:1,background:"rgba(255,255,255,0.07)"}} />
                      {formatDate(date)}
                      <div style={{height:1,flex:1,background:"rgba(255,255,255,0.07)"}} />
                    </div>
                    {evs.map(ev=>{
                      const et = EVENT_TYPES.find(e=>e.key===ev.type)||EVENT_TYPES[0];
                      return (
                        <div key={ev.id} style={{
                          background:"#141921",borderRadius:14,padding:"14px 16px",
                          marginBottom:8,border:"1px solid rgba(255,255,255,0.07)",
                          borderLeft:`3px solid ${et.color}`,
                          display:"flex",alignItems:"flex-start",gap:12
                        }}>
                          <div style={{fontSize:22,lineHeight:1,marginTop:2}}>{et.icon}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:600,color:"#F0EDE6",fontSize:15,marginBottom:2}}>{ev.title}</div>
                            {ev.startTime && (
                              <div style={{fontSize:12,color:et.color,fontWeight:700,marginBottom:3}}>
                                🕐 {ev.startTime}{ev.endTime?` – ${ev.endTime}`:""}
                              </div>
                            )}
                            {ev.location && <div style={{fontSize:13,color:"#7A8899"}}>📍 {ev.location}</div>}
                            {ev.confirmation && (
                              <div style={{fontSize:12,color:"#7A8899",marginTop:3,
                                background:"rgba(255,255,255,0.04)",borderRadius:6,
                                padding:"4px 8px",display:"inline-block",fontFamily:"monospace"}}>
                                #{ev.confirmation}
                              </div>
                            )}
                            {(ev.kosten && parseFloat(ev.kosten) > 0) && (
                              <div style={{fontSize:12,color:"#82E0AA",marginTop:3,fontWeight:600}}>
                                {ev.kostenOrig && ev.kostenWaehrung && ev.kostenWaehrung !== "EUR"
                                  ? `${parseFloat(ev.kostenOrig).toLocaleString("de-DE")} ${ev.kostenWaehrung}  ≈  ${parseFloat(ev.kosten).toFixed(2)} €`
                                  : `${parseFloat(ev.kosten).toFixed(2)} €`}
                              </div>
                            )}
                            {ev.note && <div style={{fontSize:13,color:"#666",marginTop:4,fontStyle:"italic"}}>{ev.note}</div>}
                            {ev.photos && ev.photos.length>0 && (
                              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                                {ev.photos.map((p,i)=>(
                                  <img key={i} src={p} style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)"}} />
                                ))}
                              </div>
                            )}
                            {ev.pdfs && ev.pdfs.length>0 && (
                              <div style={{display:"flex",flexDirection:"column",gap:3,marginTop:6}}>
                                {ev.pdfs.map((f,i)=>(
                                  <a key={i} href={f.data} download={f.name}
                                    style={{fontSize:12,color:"#7EB8F7",textDecoration:"none",
                                      background:"rgba(126,184,247,0.08)",borderRadius:6,
                                      padding:"4px 8px",display:"inline-block"}}>
                                    {"PDF: "+f.name}
                                  </a>
                                ))}
                              </div>
                            )}
                            {ev.gpxFiles && ev.gpxFiles.length>0 && (
                              <div style={{display:"flex",flexDirection:"column",gap:3,marginTop:4}}>
                                {ev.gpxFiles.map((f,i)=>(
                                  <a key={i} href={f.data} download={f.name}
                                    style={{fontSize:12,color:"#6FD99A",textDecoration:"none",
                                      background:"rgba(111,217,154,0.08)",borderRadius:6,
                                      padding:"4px 8px",display:"inline-block"}}>
                                    {"GPX: "+f.name}
                                  </a>
                                ))}
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{setEditEvent(ev);setShowEventForm(true);}} style={{
                              background:"rgba(255,255,255,0.06)",border:"none",color:"#aaa",
                              width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12}}>✏️</button>
                            <button onClick={()=>deleteEvent(ev.id)} style={{
                              background:"rgba(192,57,43,0.15)",border:"none",color:"#C0392B",
                              width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12}}>🗑️</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            )}

            {tab==="documents" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <span style={{fontSize:13,color:"#7A8899"}}>{(trip.documents||[]).length} Dokumente</span>
                  <Btn onClick={()=>{setEditDoc(null);setShowDocForm(true);}} small>+ Dokument</Btn>
                </div>
                {(trip.documents||[]).length===0 ? (
                  <div style={{textAlign:"center",padding:"48px 0",color:"#7A8899"}}>
                    <div style={{fontSize:36,marginBottom:12}}>📄</div>
                    <div style={{fontSize:15,marginBottom:6}}>Keine Dokumente</div>
                    <div style={{fontSize:13}}>Tickets, Buchungsbestätigungen und mehr</div>
                  </div>
                ) : (trip.documents||[]).map(d=>{
                  const dt = DOC_TYPES.find(x=>x.key===d.type)||DOC_TYPES[0];
                  const expired = d.expiry && new Date(d.expiry)<new Date();
                  return (
                    <div key={d.id} style={{
                      background:"#141921",borderRadius:14,padding:"14px 16px",
                      marginBottom:10,border:"1px solid rgba(255,255,255,0.07)",
                      display:"flex",alignItems:"flex-start",gap:12
                    }}>
                      <div style={{
                        width:44,height:44,borderRadius:12,
                        background:"rgba(212,164,76,0.15)",
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:22
                      }}>{dt.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,color:"#F0EDE6",fontSize:15}}>{d.title}</div>
                        <div style={{fontSize:12,color:"#7A8899",marginTop:2}}>{dt.label}</div>

                        {d.type === "email" ? (
                          <>
                            {d.emailFrom && (
                              <div style={{fontSize:12,color:"#7A8899",marginTop:4}}>
                                Von: <span style={{color:"#AED6F1"}}>{d.emailFrom}</span>
                              </div>
                            )}
                            {d.emailDate && (
                              <div style={{fontSize:12,color:"#7A8899",marginTop:2}}>
                                📅 {formatDate(d.emailDate)}
                              </div>
                            )}
                            {d.emailBody && (
                              <EmailBodyPreview body={d.emailBody} />
                            )}
                          </>
                        ) : (
                          <>
                            {d.number && (
                              <div style={{fontSize:12,fontFamily:"monospace",
                                color:"#D4A44C",marginTop:4,
                                background:"rgba(212,164,76,0.08)",borderRadius:6,
                                padding:"3px 8px",display:"inline-block"}}>
                                {d.number}
                              </div>
                            )}
                            {d.expiry && (
                              <div style={{fontSize:12,color:expired?"#C0392B":"#7A8899",marginTop:4}}>
                                {expired?"⚠️ Abgelaufen:":"Gültig bis:"} {formatDate(d.expiry)}
                              </div>
                            )}
                          </>
                        )}
                        {d.note && <div style={{fontSize:13,color:"#666",marginTop:4,fontStyle:"italic"}}>{d.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{setEditDoc(d);setShowDocForm(true);}} style={{
                          background:"rgba(255,255,255,0.06)",border:"none",color:"#aaa",
                          width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={()=>deleteDoc(d.id)} style={{
                          background:"rgba(192,57,43,0.15)",border:"none",color:"#C0392B",
                          width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:12}}>🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {tab==="route" && (
              <RouteMap
                tripId={trip.id}
                tripColor={trip.color}
                route={route}
                onSaveRoute={onSaveRoute}
              />
            )}

            {tab==="info" && (
              <div>
                {trip.note && (
                  <div style={{background:"#141921",borderRadius:14,padding:16,
                    marginBottom:16,border:"1px solid rgba(255,255,255,0.07)"}}>
                    <div style={{fontSize:11,color:"#7A8899",fontWeight:600,
                      letterSpacing:0.5,marginBottom:8}}>NOTIZEN</div>
                    <div style={{color:"#C0BAB0",fontSize:15,lineHeight:1.6}}>{trip.note}</div>
                  </div>
                )}
                <div style={{background:"#141921",borderRadius:14,padding:16,
                  marginBottom:16,border:"1px solid rgba(255,255,255,0.07)"}}>
                  <div style={{fontSize:11,color:"#7A8899",fontWeight:600,letterSpacing:0.5,marginBottom:12}}>
                    STATISTIKEN
                  </div>
                  {[
                    ["Reise erstellt", formatDate(new Date(trip.createdAt).toISOString().split("T")[0])],
                    ["Gesamtdauer", `${totalDays} Tage`],
                    ["Einträge", `${(trip.events||[]).length}`],
                    ["Dokumente", `${(trip.documents||[]).length}`],
                    ["Flüge", `${(trip.events||[]).filter(e=>e.type==="flight").length}`],
                    ["Hotels", `${(trip.events||[]).filter(e=>e.type==="hotel").length}`],
                  ].map(([l,v])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",
                      padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span style={{color:"#7A8899",fontSize:14}}>{l}</span>
                      <span style={{color:"#F0EDE6",fontSize:14,fontWeight:600}}>{v}</span>
                    </div>
                  ))}
                </div>
                {(() => {
                  const mitKosten = (trip.events||[]).filter(e => e.kosten && parseFloat(e.kosten) > 0);
                  const reiseKosten = trip.kosten && parseFloat(trip.kosten) > 0 ? parseFloat(trip.kosten) : 0;
                  const gesamtEvents = mitKosten.reduce((s,e)=>s+parseFloat(e.kosten||0),0);
                  const gesamt = gesamtEvents + reiseKosten;
                  return (
                    <div style={{background:"#141921",borderRadius:14,padding:16,
                      marginBottom:16,border:"1px solid rgba(255,255,255,0.07)"}}>
                      <div style={{fontSize:11,color:"#7A8899",fontWeight:600,letterSpacing:0.5,marginBottom:12}}>
                        KOSTENÜBERSICHT
                      </div>
                      {reiseKosten > 0 && (
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                          padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                          <span style={{color:"#C0BAB0",fontSize:14}}>🗺️ Allgemeine Reisekosten</span>
                          <span style={{color:"#F0EDE6",fontSize:14,fontWeight:600}}>
                            {parseFloat(trip.kosten).toFixed(2)} €
                          </span>
                        </div>
                      )}
                      {mitKosten.length === 0 && reiseKosten === 0 ? (
                        <div style={{color:"#7A8899",fontSize:14,textAlign:"center",padding:"8px 0"}}>
                          Noch keine Kosten eingetragen.
                        </div>
                      ) : (
                        mitKosten.map(e => {
                          const et = EVENT_TYPES.find(t=>t.key===e.type)||EVENT_TYPES[0];
                          return (
                            <div key={e.id} style={{display:"flex",justifyContent:"space-between",
                              alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                              <span style={{color:"#C0BAB0",fontSize:14}}>
                                {et.icon} {e.title || et.label}
                              </span>
                              <span style={{textAlign:"right"}}>
                                {e.kostenOrig && e.kostenWaehrung && e.kostenWaehrung !== "EUR" && (
                                  <div style={{fontSize:11,color:"#7A8899"}}>{parseFloat(e.kostenOrig).toLocaleString("de-DE")} {e.kostenWaehrung}</div>
                                )}
                                <span style={{color:"#F0EDE6",fontSize:14,fontWeight:600}}>
                                  {parseFloat(e.kosten).toFixed(2)} €
                                </span>
                              </span>
                            </div>
                          );
                        })
                      )}
                      {gesamt > 0 && (
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                          padding:"10px 0 2px 0",marginTop:4}}>
                          <span style={{color:"#F0EDE6",fontSize:15,fontWeight:700}}>Gesamt</span>
                          <span style={{color:trip.color||"#F0EDE6",fontSize:16,fontWeight:800}}>
                            {gesamt.toFixed(2)} €
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })()}
                <Btn onClick={()=>setConfirmDelete(true)} full danger>Reise löschen</Btn>
              </div>
            )}
          </div>

          {showEventForm && (
            <EventForm event={editEvent}
              onSave={ev=>{saveEvent(ev);setShowEventForm(false);}}
              onClose={()=>setShowEventForm(false)} />
          )}
          {showDocForm && (
            <DocumentForm doc={editDoc}
              onSave={d=>{saveDoc(d);setShowDocForm(false);}}
              onClose={()=>setShowDocForm(false)} />
          )}
          {showTripForm && (
            <TripForm trip={trip}
              onSave={t=>onUpdate(t)}
              onClose={()=>setShowTripForm(false)} />
          )}
          {confirmDelete && (
            <Modal title="Reise löschen?" onClose={()=>setConfirmDelete(false)}>
              <p style={{color:"#aaa",marginBottom:20}}>
                Diese Aktion löscht die Reise „{trip.name}" mit allen Einträgen und Dokumenten unwiderruflich.
              </p>
              <div style={{display:"flex",gap:10}}>
                <Btn onClick={()=>setConfirmDelete(false)} full variant="secondary">Abbrechen</Btn>
                <Btn onClick={()=>{onDelete(trip.id);setConfirmDelete(false);}} full danger>Löschen</Btn>
              </div>
            </Modal>
          )}
          {showBookingImport && detectedBooking && (
            <BookingImportModal
              booking={detectedBooking}
              onConfirm={handleBookingConfirm}
              onCancel={()=>{setShowBookingImport(false);setDetectedBooking(null);setPendingEmailDoc(null);}}
            />
          )}
        </div>
      );
    }

    // ──────────────────────────────────────────────────
    //  HOME / TRIP LIST
    // ──────────────────────────────────────────────────
    function Home({ trips, onSelect, onAdd, onExport, onImport }) {
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("all");

      const filtered = trips.filter(t => {
        const matchSearch = t.name.toLowerCase().includes(search.toLowerCase()) ||
          (t.destination||"").toLowerCase().includes(search.toLowerCase());
        if (!matchSearch) return false;
        const prog = tripProgress(t.startDate, t.endDate);
        if (filter==="upcoming") return prog===0;
        if (filter==="active") return prog>0&&prog<100;
        if (filter==="past") return prog>=100;
        return true;
      });

      const upcoming = trips.filter(t=>tripProgress(t.startDate,t.endDate)===0).length;
      const active = trips.filter(t=>{const p=tripProgress(t.startDate,t.endDate);return p>0&&p<100;}).length;

      return (
        <div style={{minHeight:"100vh",background:"#0A0E14",paddingBottom:40}}>
          <div style={{
            background:"linear-gradient(180deg,#141921 0%,#0A0E14 100%)",
            padding:"24px 20px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)"
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,
                  fontWeight:700,color:"#F0EDE6",lineHeight:1.1}}>Meine Reisen</div>
                <div style={{fontSize:13,color:"#7A8899",marginTop:4}}>
                  {trips.length} {trips.length===1?"Reise":"Reisen"} gespeichert
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={onImport} title="Daten importieren" style={{
                  background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
                  color:"#C0BAB0",width:38,height:38,borderRadius:"50%",cursor:"pointer",
                  fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"
                }}>📥</button>
                <button onClick={onExport} title="Daten exportieren" style={{
                  background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
                  color:"#C0BAB0",width:38,height:38,borderRadius:"50%",cursor:"pointer",
                  fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"
                }}>📤</button>
                <button onClick={onAdd} style={{
                  background:"#D4A44C",border:"none",color:"#0A0E14",
                  width:42,height:42,borderRadius:"50%",cursor:"pointer",
                  fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",
                  boxShadow:"0 4px 16px rgba(212,164,76,0.4)"
                }}>+</button>
              </div>
            </div>

            {trips.length > 0 && (
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                {active > 0 && (
                  <div style={{background:"rgba(82,224,128,0.1)",borderRadius:10,
                    padding:"8px 12px",flex:1,border:"1px solid rgba(82,224,128,0.2)"}}>
                    <div style={{fontSize:18,fontWeight:700,color:"#52E080"}}>{active}</div>
                    <div style={{fontSize:11,color:"#52E080",opacity:0.8}}>Aktiv</div>
                  </div>
                )}
                <div style={{background:"rgba(212,164,76,0.1)",borderRadius:10,
                  padding:"8px 12px",flex:1,border:"1px solid rgba(212,164,76,0.2)"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#D4A44C"}}>{upcoming}</div>
                  <div style={{fontSize:11,color:"#D4A44C",opacity:0.8}}>Bevorstehend</div>
                </div>
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:10,
                  padding:"8px 12px",flex:1,border:"1px solid rgba(255,255,255,0.07)"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#7A8899"}}>
                    {trips.filter(t=>tripProgress(t.startDate,t.endDate)>=100).length}
                  </div>
                  <div style={{fontSize:11,color:"#7A8899"}}>Abgeschlossen</div>
                </div>
              </div>
            )}

            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#7A8899",fontSize:16}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Reise suchen…"
                style={{width:"100%",background:"rgba(255,255,255,0.06)",
                  border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,
                  padding:"10px 14px 10px 36px",color:"#F0EDE6",fontSize:15,outline:"none",
                  fontFamily:"inherit",boxSizing:"border-box"}} />
            </div>

            <div style={{display:"flex",gap:8}}>
              {[["all","Alle"],["upcoming","Bevorstehend"],["active","Aktiv"],["past","Vergangen"]].map(([k,l])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{
                  background:filter===k?"#D4A44C":"rgba(255,255,255,0.06)",
                  border:"none",color:filter===k?"#0A0E14":"#7A8899",
                  borderRadius:20,padding:"5px 12px",cursor:"pointer",
                  fontSize:12,fontWeight:600,fontFamily:"inherit",transition:"all .15s"
                }}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:"20px"}}>
            {trips.length===0 ? (
              <div style={{textAlign:"center",padding:"64px 0",color:"#7A8899"}}>
                <div style={{fontSize:56,marginBottom:16}}>🌍</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,
                  color:"#F0EDE6",marginBottom:8}}>Deine erste Reise</div>
                <div style={{fontSize:15,marginBottom:28,lineHeight:1.6}}>
                  Plane und organisiere deine Reisen,<br/>Flüge, Hotels und Dokumente
                </div>
                <Btn onClick={onAdd}>Reise erstellen</Btn>
              </div>
            ) : filtered.length===0 ? (
              <div style={{textAlign:"center",padding:"48px 0",color:"#7A8899"}}>
                <div style={{fontSize:32}}>🔍</div>
                <div style={{marginTop:12}}>Keine Reisen gefunden</div>
              </div>
            ) : filtered.map(t=>(
              <TripCard key={t.id} trip={t} onClick={()=>onSelect(t.id)} onPdf={()=>generateTripPDF(t)} />
            ))}
          </div>
        </div>
      );
    }

    // ──────────────────────────────────────────────────
    //  ROOT APP
    // ──────────────────────────────────────────────────
    function App() {
      const [trips, setTrips] = useLocalStorage(STORAGE_KEY, []);
      const [routes, setRoutes] = useLocalStorage(STORAGE_ROUTES, {});
      const [selectedId, setSelectedId] = useState(null);
      const [showTripForm, setShowTripForm] = useState(false);
      const importRef = useRef(null);

      const saveTrip = (trip) => {
        setTrips(prev => {
          const idx = prev.findIndex(t=>t.id===trip.id);
          return idx>=0 ? prev.map(t=>t.id===trip.id?trip:t) : [...prev, trip];
        });
      };

      const deleteTrip = (id) => {
        setTrips(prev => prev.filter(t=>t.id!==id));
        setRoutes(prev => { const r = {...prev}; delete r[id]; return r; });
        setSelectedId(null);
      };

      const saveRoute = (tripId, geoJson) => {
        setRoutes(prev => geoJson
          ? { ...prev, [tripId]: geoJson }
          : Object.fromEntries(Object.entries(prev).filter(([k]) => k !== tripId))
        );
      };

      const exportData = async () => {
        const datum = new Date().toISOString().split("T")[0];
        const json = JSON.stringify(trips, null, 2);
        const filename = `reiseplaner_backup_${datum}.json`;
        const file = new File([json], filename, { type: "application/json" });
        // iOS: Share Sheet → "In Dateien sichern" → iCloud Drive
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: "Reiseplaner Backup" });
            return;
          } catch (err) {
            if (err.name === "AbortError") return; // Nutzer hat abgebrochen
          }
        }
        // Fallback für Desktop-Browser
        const url = URL.createObjectURL(file);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) { alert("Ungültige Datei."); return; }
            if (window.confirm(`${data.length} Reise(n) gefunden. Aktuelle Daten ersetzen?`)) {
              setTrips(data);
            }
          } catch { alert("Datei konnte nicht gelesen werden."); }
          e.target.value = "";
        };
        reader.readAsText(file);
      };

      const selectedTrip = trips.find(t=>t.id===selectedId);

      return (
        <div style={{maxWidth:480,margin:"0 auto",fontFamily:"'DM Sans',sans-serif",
          minHeight:"100vh",background:"#0A0E14",position:"relative"}}>
          <input ref={importRef} type="file" accept=".json" onChange={importData}
            style={{display:"none"}} />
          {selectedTrip ? (
            <TripDetail
              trip={selectedTrip}
              onUpdate={saveTrip}
              onBack={()=>setSelectedId(null)}
              onDelete={deleteTrip}
              route={routes[selectedId] || null}
              onSaveRoute={saveRoute}
            />
          ) : (
            <Home
              trips={trips}
              onSelect={setSelectedId}
              onAdd={()=>setShowTripForm(true)}
              onExport={exportData}
              onImport={()=>importRef.current.click()}
            />
          )}
          {showTripForm && (
            <TripForm
              trip={null}
              onSave={t=>{saveTrip(t);setShowTripForm(false);}}
              onClose={()=>setShowTripForm(false)}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
